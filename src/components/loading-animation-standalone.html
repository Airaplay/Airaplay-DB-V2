<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airaplay Loading Animation - Standalone</title>
  <style>
    /*
      Standalone CSS-only version
      Can be used without React if needed
    */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom, #1a1a1a, #0d0d0d, #000000);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }

    /* Loading Container */
    .airaplay-loading {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Sizes */
    .airaplay-loading.small {
      width: 48px;
      height: 48px;
    }

    .airaplay-loading.large {
      width: 128px;
      height: 128px;
    }

    /* Logo Wrapper */
    .airaplay-loading__logo {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoBreath 2.5s ease-in-out infinite;
      transform-origin: center;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform;
    }

    /* Logo Image */
    .airaplay-loading__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(48, 150, 5, 0.3));
      animation: logoGlow 2.5s ease-in-out infinite;
      will-change: filter, opacity;
    }

    /* Ring Effects */
    .airaplay-loading__ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(48, 150, 5, 0.2);
      animation: ringPulse 2.5s ease-out infinite;
      will-change: transform, opacity;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .airaplay-loading__ring:nth-child(2) {
      width: 100%;
      height: 100%;
      animation-delay: 0s;
    }

    .airaplay-loading__ring:nth-child(3) {
      width: 120%;
      height: 120%;
      animation-delay: 0.4s;
    }

    .airaplay-loading__ring:nth-child(4) {
      width: 140%;
      height: 140%;
      animation-delay: 0.8s;
    }

    /* Pulse Backdrop */
    .airaplay-loading__backdrop {
      position: absolute;
      width: 80%;
      height: 80%;
      background: radial-gradient(
        circle,
        rgba(48, 150, 5, 0.15) 0%,
        transparent 70%
      );
      border-radius: 50%;
      animation: backdropPulse 2.5s ease-in-out infinite;
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    /* Loading Text */
    .airaplay-loading__text {
      margin-top: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.5px;
      animation: textFade 2.5s ease-in-out infinite;
      text-align: center;
    }

    /* Animations */
    @keyframes logoBreath {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes logoGlow {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(48, 150, 5, 0.3));
        opacity: 1;
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(48, 150, 5, 0.5));
        opacity: 0.95;
      }
    }

    @keyframes ringPulse {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      25% {
        opacity: 0.4;
      }
      50% {
        transform: scale(1.5);
        opacity: 0;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    @keyframes backdropPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.3);
        opacity: 0.3;
      }
    }

    @keyframes textFade {
      0%, 100% {
        opacity: 0.8;
      }
      50% {
        opacity: 0.5;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .airaplay-loading__logo,
      .airaplay-loading__logo img,
      .airaplay-loading__ring,
      .airaplay-loading__backdrop,
      .airaplay-loading__text {
        animation: none !important;
      }
      .airaplay-loading__logo img {
        opacity: 0.9;
      }
    }

    /* Demo Styles */
    .demo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      padding: 2rem;
    }

    .demo-row {
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .demo-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.875rem;
      text-align: center;
    }

    h1 {
      color: white;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div>

          <div class="airaplay-loading__ring"></div>

        <div class="demo-label">Large (128px)</div>
      </div>

    <!-- With Text Example -->
    <div class="demo-item">
      <div class="airaplay-loading">
        <div class="airaplay-loading__backdrop"></div>
        <div class="airaplay-loading__ring"></div>

      </div>
      <div class="airaplay-loading__text">Loading your music...</div>
    </div>
  </div>
