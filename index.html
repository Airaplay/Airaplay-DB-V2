<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Airaplay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Discover and stream amazing music from talented artists worldwide" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.pexels.com" />
    <link rel="preconnect" href="https://vwcadgjaivvffxwgnkzy.supabase.co" />
    
    <!-- Optimize font loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
    
    <style>
      /* Critical CSS for initial render - prevents white flicker */
      html {
        height: 100%;
        background-color: #0a0a0a;
      }

      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: white;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
        position: relative;
      }

      #app {
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        background: linear-gradient(to bottom, #0a0a0a, #0d0d0d, #111111);
        position: relative;
        width: 100%;
      }

      #app > .admin-layout {
        width: 100%;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
